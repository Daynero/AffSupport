<!doctype html>
<html lang="uk">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Wishly — Tools</title>
    <meta
      name="description"
      content="A collection of local Wishly tools for working with your files."
    />
    <meta name="theme-color" content="#7557e8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Wishly" />
    <meta property="og:title" content="Wishly — Tools" />
    <meta
      property="og:description"
      content="Local Wishly tools for working with files on your computer."
    />
    <meta property="og:url" content="%SITE_ORIGIN%" />
    <meta property="og:image" content="%SITE_ORIGIN%/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
  </head>
  <body>
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('theme');
          var theme =
            stored === 'light' || stored === 'dark'
              ? stored
              : window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches
                ? 'dark'
                : 'light';
          document.documentElement.dataset.theme = theme;
          document.documentElement.style.colorScheme = theme;
          if (theme === 'dark') {
            var meta = document.querySelector('meta[name="theme-color"]');
            if (meta) meta.setAttribute('content', '#120e1f');
          }
        } catch (e) {}
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
